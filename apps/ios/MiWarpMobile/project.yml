name: MiWarpMobile
options:
  bundleIdPrefix: com.miwarp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  swiftVersion: "5.9"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: MiWarpMobile/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MiWarpMobile:
    type: application
    platform: iOS
    sources:
      - path: MiWarpMobile
        excludes:
          - "**/.DS_Store"
    resources:
      - path: MiWarpMobile/Resources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miwarp.mobile
        PRODUCT_NAME: MiWarp
        PRODUCT_MODULE_NAME: MiWarpMobile
        INFOPLIST_FILE: MiWarpMobile/Resources/Info.plist
    entitlements:
      path: MiWarpMobile/Resources/MiWarpMobile.entitlements
    dependencies:
      - target: MiWarpLiveActivityExtension
        embed: true
        codeSign: true

  MiWarpMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MiWarpMobileTests
    dependencies:
      - target: MiWarpMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miwarp.mobile.tests
        PRODUCT_NAME: MiWarpMobileTests
        PRODUCT_MODULE_NAME: MiWarpMobileTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MiWarp.app/MiWarp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        INFOPLIST_FILE: MiWarpMobileTests/Info.plist

  MiWarpLiveActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: MiWarpLiveActivityExtension
      - path: MiWarpMobile/LiveActivities/Models
      - path: MiWarpMobile/LiveActivities/Attributes
      - path: MiWarpMobile/LiveActivities/DeepLink
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.miwarp.mobile.MiWarpLiveActivityExtension
        INFOPLIST_FILE: MiWarpLiveActivityExtension/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_NAME: "MiWarpLiveActivityExtension"
    entitlements:
      path: MiWarpLiveActivityExtension/MiWarpLiveActivityExtension.entitlements

schemes:
  MiWarpMobile:
    build:
      targets:
        MiWarpMobile: all
        MiWarpLiveActivityExtension: all
    test:
      targets:
        - MiWarpMobileTests
