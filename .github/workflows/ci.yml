name: CI

# v1.0.6 / 12.2: CI also runs on pushes to feature/* branches so devs
# catch failures before opening a PR. Master PR remains the merge gate.
on:
  pull_request:
    branches: [master]
  push:
    branches:
      - master
      - "feat/**"
      - "fix/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Version alignment
        run: npm run version:check

      - name: Architecture gates
        run: npm run arch:check

      - name: Root pollution check
        run: npm run check:root

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Lint
        run: |
          if ! npm run lint; then
            echo ""
            echo "::error::ESLint check failed. Run locally to auto-fix:"
            echo "  npx eslint --fix src/"
            exit 1
          fi

      - name: Format check
        run: |
          if ! npm run format:check; then
            echo ""
            echo "::error::Prettier format check failed. Run locally to fix:"
            echo "  npx prettier --write ."
            exit 1
          fi

      - name: i18n check
        run: npm run i18n:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  rust:
    name: Rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        shell: bash
        run: |
          if ! cargo fmt --manifest-path src-tauri/Cargo.toml --check; then
            echo ""
            echo "::error::Rust format check failed. Run locally to fix:"
            echo "  cargo fmt --manifest-path src-tauri/Cargo.toml"
            exit 1
          fi

      - name: Create frontend build stub
        run: mkdir -p build

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Unit tests
        if: runner.os == 'Linux'
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android/MiWarpMobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;34.0.0"

      - name: Unit tests, lint, and debug build
        run: ./gradlew --no-daemon testDebugUnitTest lintDebug assembleDebug

  ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift package tests
        run: swift test --package-path apps/ios/MiWarpMobile

      - name: Simulator build
        run: xcodebuild -project apps/ios/MiWarpMobile/MiWarpMobile.xcodeproj -scheme MiWarpMobile -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build

  build-windows:
    name: Build Windows
    if: contains(github.event.pull_request.labels.*.name, 'build-windows') || contains(github.event.pull_request.labels.*.name, 'build-test')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: x86_64-pc-windows-msvc

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Zip Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exeDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $exe = Get-ChildItem "$exeDir/*.exe" | Select-Object -First 1
          $zipName = [System.IO.Path]::ChangeExtension($exe.Name, ".zip")
          Compress-Archive -Path $exe.FullName -DestinationPath "$exeDir/$zipName"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS
    if: contains(github.event.pull_request.labels.*.name, 'build-macos') || contains(github.event.pull_request.labels.*.name, 'build-test')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: universal-apple-darwin

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  build-linux:
    name: Build Linux
    if: contains(github.event.pull_request.labels.*.name, 'build-linux') || contains(github.event.pull_request.labels.*.name, 'build-test')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: x86_64-unknown-linux-gnu

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target x86_64-unknown-linux-gnu

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-linux
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7
