name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Version alignment
        run: npm run version:check

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Lint
        run: |
          if ! npm run lint; then
            echo ""
            echo "::error::ESLint check failed. Run locally to auto-fix:"
            echo "  npx eslint --fix src/"
            exit 1
          fi

      - name: Format check
        run: |
          if ! npm run format:check; then
            echo ""
            echo "::error::Prettier format check failed. Run locally to fix:"
            echo "  npx prettier --write ."
            exit 1
          fi

      - name: i18n check
        run: npm run i18n:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  rust:
    name: Rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Format check
        shell: bash
        run: |
          if ! cargo fmt --manifest-path src-tauri/Cargo.toml --check; then
            echo ""
            echo "::error::Rust format check failed. Run locally to fix:"
            echo "  cargo fmt --manifest-path src-tauri/Cargo.toml"
            exit 1
          fi

      - name: Create frontend build stub
        run: mkdir -p build

      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  build-windows:
    name: Build Windows
    if: contains(github.event.pull_request.labels.*.name, 'build-windows') || contains(github.event.pull_request.labels.*.name, 'build-test')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: x86_64-pc-windows-msvc

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Zip Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exeDir = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          $exe = Get-ChildItem "$exeDir/*.exe" | Select-Object -First 1
          $zipName = [System.IO.Path]::ChangeExtension($exe.Name, ".zip")
          Compress-Archive -Path $exe.FullName -DestinationPath "$exeDir/$zipName"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.zip
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS
    if: contains(github.event.pull_request.labels.*.name, 'build-macos') || contains(github.event.pull_request.labels.*.name, 'build-test')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: universal-apple-darwin

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target universal-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7
