name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - run: npm ci

      - name: Verify package.json version matches git tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=v${TAG} package.json=${PKG}"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Version mismatch: git tag v${TAG} but package.json is ${PKG}. Run: npm run release ${TAG}"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      # Set repository secret TAURI_SIGNING_PRIVATE_KEY to the contents of src-tauri/miwarp.key
      # (generate locally: npm run tauri signer generate -- -w src-tauri/miwarp.key -p "")
      # Without this secret the action still uploads binaries, but `latest.json` and
      # the per-asset `.sig` are skipped — which silently breaks the in-app updater.
      # We fail the job early so the release maintainer notices and can re-run after
      # configuring the secret. The `Update` fallback in
      # `src/lib/utils/app-updater.ts` (external GitHub download URL) keeps the
      # app usable even when this fails, so users are never bricked.
      - name: Verify updater signing key is configured
        if: env.TAURI_SIGNING_PRIVATE_KEY == ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing secret TAURI_SIGNING_PRIVATE_KEY. The in-app updater needs latest.json + .sig files; without them the Tauri updater plugin will fail at runtime and only the GitHub download fallback works."
            echo "::error::Fix: Settings → Secrets and variables → Actions → New repository secret. Name: TAURI_SIGNING_PRIVATE_KEY. Value: contents of src-tauri/miwarp.key (also add TAURI_SIGNING_PRIVATE_KEY_PASSWORD if you set one when generating)."
            echo "::error::Regenerate locally with: npm run tauri signer generate -- -w src-tauri/miwarp.key -p \"\""
            exit 1
          fi

      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MiWarp ${{ github.ref_name }}
          generateReleaseNotes: true
          tauriScript: npm run tauri
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}
