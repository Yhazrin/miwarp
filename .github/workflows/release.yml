name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify package.json version matches git tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=v${TAG} package.json=${PKG}"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Version mismatch: git tag v${TAG} but package.json is ${PKG}. Run: npm run release ${TAG}"
            exit 1
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Share the dependency cache warmed by Build Artifacts. A universal macOS
          # build compiles both Apple Silicon and Intel targets, so a cold cache
          # otherwise adds roughly twenty minutes before bundling even begins.
          key: artifacts-${{ matrix.target }}

      # Set repository secret TAURI_SIGNING_PRIVATE_KEY to the contents of src-tauri/miwarp.key
      # (generate locally: npm run tauri signer generate -- -w src-tauri/miwarp.key -p "")
      # Without this secret the action still uploads binaries, but `latest.json` and
      # the per-asset `.sig` are skipped — which silently breaks the in-app updater.
      # We fail the job early so the release maintainer notices and can re-run after
      # configuring the secret. The `Update` fallback in
      # `src/lib/utils/app-updater.ts` (external GitHub download URL) keeps the
      # app usable even when this fails, so users are never bricked.
      - name: Verify updater signing key is configured
        if: env.TAURI_SIGNING_PRIVATE_KEY == ''
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::Missing secret TAURI_SIGNING_PRIVATE_KEY. The in-app updater needs latest.json + .sig files; without them the Tauri updater plugin will fail at runtime and only the GitHub download fallback works."
            echo "::error::Fix: Settings → Secrets and variables → Actions → New repository secret. Name: TAURI_SIGNING_PRIVATE_KEY. Value: contents of src-tauri/miwarp.key (also add TAURI_SIGNING_PRIVATE_KEY_PASSWORD if you set one when generating)."
            echo "::error::Regenerate locally with: npm run tauri signer generate -- -w src-tauri/miwarp.key -p \"\""
            exit 1
          fi

      - name: Build Tauri app and upload release assets
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NODE_OPTIONS: --max-old-space-size=6144
        with:
          tagName: ${{ github.ref_name }}
          releaseName: MiWarp ${{ github.ref_name }}
          generateReleaseNotes: true
          tauriScript: npm run tauri
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target ${{ matrix.target }}

  # tauri-action generates latest.json with GitHub API asset URLs
  # (https://api.github.com/repos/…/assets/ID) which are subject to
  # 60 req/h rate-limit for unauthenticated requests → 403 Forbidden
  # when the in-app updater tries to download.  This job runs after all
  # platform builds finish and replaces API URLs with direct
  # browser_download_url links that have no rate-limit.
  patch-updater-json:
    name: Patch updater JSON
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Replace API URLs with direct download links in latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          OWNER_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Download current latest.json (accumulated by tauri-action across all platforms)
          curl -fsSL "https://github.com/${OWNER_REPO}/releases/download/${TAG}/latest.json" -o /tmp/latest.json

          # Fetch release assets via API (authenticated → no rate-limit)
          ASSETS_JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER_REPO}/releases/tags/${TAG}")

          # Replace every api.github.com/repos/…/assets/{id} with its browser_download_url
          node -e '
            const fs = require("fs");
            const release = JSON.parse(process.env.ASSETS_JSON);
            const idToUrl = new Map();
            for (const a of release.assets || []) {
              idToUrl.set(String(a.id), a.browser_download_url);
            }
            let json = fs.readFileSync("/tmp/latest.json", "utf8");
            const replaced = [];
            json = json.replace(
              /https:\/\/api\.github\.com\/repos\/[^/]+\/[^/]+\/releases\/assets\/(\d+)/g,
              (match, id) => {
                const url = idToUrl.get(id);
                if (url) { replaced.push(id); return url; }
                return match;
              }
            );
            fs.writeFileSync("/tmp/latest.json", json);
            console.log("Patched latest.json — replaced", replaced.length, "API URLs with direct links");
          '

          # Re-upload patched latest.json (overwrites the one tauri-action uploaded)
          gh release upload "${TAG}" /tmp/latest.json --clobber
        shell: bash
