# One-off / manual: build Linux installers from an existing tag and attach to a GitHub Release.
name: Backfill Release Linux

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to build from (source tree)
        required: true
        default: v1.0.4
      release_tag:
        description: GitHub Release tag to upload assets to
        required: true
        default: v1.0.4

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux (${{ inputs.tag }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - run: npm ci

      # v1.0.4 had empty beforeBuildCommand; build frontend explicitly.
      - run: npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: backfill-linux-${{ inputs.tag }}

      - name: Build Tauri Linux bundles
        uses: tauri-apps/tauri-action@v0
        with:
          args: --target x86_64-unknown-linux-gnu

      - name: Upload Linux assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          deb=(src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb)
          appimage=(src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage)
          if [ ${#deb[@]} -eq 0 ] && [ ${#appimage[@]} -eq 0 ]; then
            echo "::error::No .deb or .AppImage bundles found"
            ls -laR src-tauri/target/x86_64-unknown-linux-gnu/release/bundle || true
            exit 1
          fi
          files=("${deb[@]}" "${appimage[@]}")
          echo "Uploading: ${files[*]}"
          gh release upload "${{ inputs.release_tag }}" "${files[@]}" --clobber
