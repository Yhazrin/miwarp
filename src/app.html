<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MiWarp</title>
    <script src="%sveltekit.assets%/splash-boot.js"></script>
    <link rel="stylesheet" href="%sveltekit.assets%/design-tokens.css" />
    <link rel="stylesheet" href="%sveltekit.assets%/splash.css" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app-splash" role="status" aria-live="polite" aria-label="Loading MiWarp">
      <div class="splash-backdrop" aria-hidden="true">
        <div class="splash-glow splash-glow--a"></div>
        <div class="splash-glow splash-glow--b"></div>
      </div>
      <div class="splash-stage">
        <div class="splash-logo-wrap">
          <img
            class="splash-logo splash-logo--dark"
            src="%sveltekit.assets%/logo-dark.png"
            alt="MiWarp"
            draggable="false"
          />
          <img
            class="splash-logo splash-logo--light"
            src="%sveltekit.assets%/logo-light.png"
            alt="MiWarp"
            draggable="false"
          />
        </div>
        <p class="splash-brand">MiWarp</p>
        <div class="splash-loader" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="splash-hint" id="splash-hint">Loading…</p>
      </div>
    </div>
    <script>
      (function () {
        var hint = document.documentElement.getAttribute("data-splash-hint");
        var el = document.getElementById("splash-hint");
        if (hint && el) el.textContent = hint;
      })();
    </script>
    <div id="app-root">%sveltekit.body%</div>
  </body>
</html>
